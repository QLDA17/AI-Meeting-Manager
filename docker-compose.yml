version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multiminutes-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://multiminutes:multiminutes_password@db:3306/multiminutes
      - REDIS_URL=redis://redis:6379/0
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_EMAIL=noreply@multiminutes.ai
      - FRONTEND_URL=http://localhost:5173
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - PHOBERT_ENABLED=${PHOBERT_ENABLED:-false}
      - PHOBERT_MODEL=${PHOBERT_MODEL:-vinai/phobert-base}
      - PHOBERT_DEVICE=${PHOBERT_DEVICE:-auto}
      - PHOBERT_DIALECT_ENABLED=${PHOBERT_DIALECT_ENABLED:-true}
      - PHOBERT_MLM_CORRECTION_ENABLED=${PHOBERT_MLM_CORRECTION_ENABLED:-false}
      - PHOBERT_MAX_LENGTH=${PHOBERT_MAX_LENGTH:-256}
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
      - ./backend/exports:/app/exports
    depends_on:
      - db
      - redis
    networks:
      - multiminutes-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: multiminutes-db
    environment:
      - MYSQL_DATABASE=multiminutes
      - MYSQL_USER=multiminutes
      - MYSQL_PASSWORD=multiminutes_password
      - MYSQL_ROOT_PASSWORD=root_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/database/mysql_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "3307:3306"
    networks:
      - multiminutes-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_password" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: multiminutes-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - multiminutes-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (Nginx serving static files)
  frontend:
    image: nginx:alpine
    container_name: multiminutes-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    networks:
      - multiminutes-network
    restart: unless-stopped

  # phpMyAdmin (Database Management UI)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: multiminutes-phpmyadmin
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=root_password
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - multiminutes-network
    restart: unless-stopped

networks:
  multiminutes-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
